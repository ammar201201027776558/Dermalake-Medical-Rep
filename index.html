<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-card {
      background: white;
      padding: 30px 28px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      width: 320px;
      text-align: center;
    }
    .login-card h1 {
      margin: 0 0 18px;
      font-size: 22px;
      color: #222;
    }
    .login-card .input-group {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .login-card input[type="text"] {
      flex: 1;
      padding: 14px 16px;
      border-radius: 40px;
      border: 2px solid #111;
      background: #eee;
      color: #333;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .login-card input[type="text"]:focus {
      border-color: #0c9;
      background: #fff;
    }
    .login-card button {
      border: none;
      background: #14c76b;
      color: white;
      padding: 14px 22px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .login-card button:hover {
      background: #0da45c;
      transform: translateY(-1px);
    }
    .message {
      margin-top: 14px;
      font-size: 15px;
      color: #555;
    }
    .message.success {
      color: #117a37;
    }
    .message.error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Enter your 5-digit code</h1>
    <div class="input-group">
      <input id="codeInput" type="text" placeholder="code number" maxlength="5" inputmode="numeric" pattern="\d*" />
      <button id="loginButton">loge in</button>
    </div>
    <div id="message" class="message"></div>
  </div>

  <script>
    const adminCode = '10109';
    const codeInput = document.getElementById('codeInput');
    const loginButton = document.getElementById('loginButton');
    const message = document.getElementById('message');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message ' + (type || '');
    }

    function validateCode(value) {
      return /^\d{5}$/.test(value);
    }

    function getUserCodes() {
      const stored = localStorage.getItem('userCodes');
      return stored ? JSON.parse(stored) : [];
    }

    function handleLogin() {
      const code = codeInput.value.trim();
      if (!validateCode(code)) {
        showMessage('Please enter a valid 5-digit code.', 'error');
        return;
      }
      if (code === adminCode) {
        window.location.href = 'admin.html';
        return;
      }
      const userCodes = getUserCodes();
      const user = userCodes.find(u => u.code === code);
      if (user) {
        sessionStorage.setItem('userCode', user.code);
        sessionStorage.setItem('userName', user.name);
        window.location.href = 'dashboard.html';
        return;
      }
      showMessage('Invalid code. Please try again.', 'error');
    }

    loginButton.addEventListener('click', handleLogin);
    codeInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        handleLogin();
      }
    });
  </script>
</body>
</html>
